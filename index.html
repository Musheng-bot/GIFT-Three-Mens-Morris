<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>移动三子棋 - 双人/AI 全能版</title>
    <style>
        :root {
            --red: #ff4757;
            --blue: #2e86de;
            --bg: #f5f6fa;
            --cell-bg: #ffffff;
            --line: #ced4da;
        }

        body {
            background-image: url('img/background.jpg');
            background-repeat: no-repeat;
            background-size: 100%;
            background-position: center;
            margin: 0; padding: 0;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; background-color: var(--bg);
            font-family: -apple-system, "Microsoft YaHei", sans-serif;
            touch-action: manipulation;
        }

        /* 顶部信息栏 */
        .header { width: 100%; padding: 10px 0; text-align: center; }
        #status { font-size: 1.8rem; font-weight: 900; margin-bottom: 8px; color: #2f3542; }
        .sub-info { display: flex; justify-content: center; gap: 15px; font-size: 0.95rem; color: #7f8c8d; height: 24px; }
        .badge { background: #2f3542; color: white; padding: 2px 10px; border-radius: 4px; }

        /* 棋盘容器 */
        .board-container {
            position: relative;
            padding: 20px;
            background: #c0c4c9ff;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        #board-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.7);
            border-radius: 16px; z-index: 10;
            display: flex; align-items: center; justify-content: center;
            backdrop-filter: blur(2px); transition: 0.3s;
        }
        #board-overlay.hidden { opacity: 0; pointer-events: none; }

        /* 连线层 */
        .lines-layer {
            position: absolute; top: 20px; left: 20px;
            width: calc(100% - 40px); height: calc(100% - 40px);
            z-index: 0; pointer-events: none;
        }
        .lines-layer line { stroke: var(--line); stroke-width: 4px; stroke-linecap: round; }

        .board {
            display: grid;
            grid-template-columns: repeat(3, 100px);
            grid-template-rows: repeat(3, 100px);
            gap: 30px; position: relative; z-index: 1;
        }

        .cell {
            width: 100px; height: 100px;
            background: var(--cell-bg);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.2s;
            border: 2px solid transparent;
        }

        /* 棋子预留空间 */
        .piece {
            width: 100%; height: 100%;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: white; font-weight: bold; background-size: cover;
        }
        .piece.X { 
            background-color: var(--red);
            /* 替换为你喜欢的网络图片地址 */
            background-image: url('img/x.jpg');
            background-size: 100%; /* 缩放图片使其不占满整个圆圈 */
            background-repeat: no-repeat;
            background-position: center;
            box-shadow: 0 5px 15px rgba(255, 71, 87, 0.4); 
        }
        .piece.O { 
            background-color: var(--blue); 
            /* 替换为你喜欢的网络图片地址 */
            background-image: url('img/o.jpg');
            background-size: 100%; /* 缩放图片使其不占满整个圆圈 */
            background-repeat: no-repeat;
            background-position: center;
            box-shadow: 0 5px 15px rgba(46, 134, 222, 0.4); 
        }

        .selected { transform: scale(1.1); border: 4px solid #2f3542; }
        .can-move-to { background: #e3fae6; border: 3px dashed #2ed573; }
        .winner-cell { background: #2ed573 !important; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }

        /* 底部控制区 */
        .controls { margin-top: 25px; display: flex; flex-direction: column; gap: 10px; width: 300px; }
        .btn { padding: 12px 0; border-radius: 8px; border: none; font-size: 1rem; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-primary { background: #2f3542; color: white; }
        .btn-outline { background: white; color: #2f3542; border: 2px solid #2f3542; }
        .btn-danger { background: #ff4757; color: white; }
        
        /* 模式切换按钮组 */
        .mode-group { display: flex; gap: 5px; margin-bottom: 5px; }
        .mode-btn { flex: 1; padding: 8px; font-size: 0.85rem; background: #eee; border: 1px solid #ccc; border-radius: 4px; cursor: pointer; }
        .mode-btn.active { background: #2f3542; color: white; border-color: #2f3542; }

        .hidden-node { display: none !important; }

        .container {
            background-color: rgba(255, 255, 255, 0.5);
            padding-top: 5%;
            padding-bottom: 5%;
            height: 80%;
            width: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <div id="status">三子棋</div>
            <div class="sub-info">
                <span id="phase-text" class="hidden-node">请开始游戏</span>
                <span class="badge hidden-node">剩余 <span id="round-val">20</span> 回合</span>
            </div>
        </div>

        <div class="board-container">
            <div id="board-overlay">
                <span style="font-weight: bold; color: #57606f;">选择模式并点击开始</span>
            </div>
            
            <svg class="lines-layer" viewBox="0 0 360 360">
                <line x1="50" y1="50" x2="310" y2="50"></line>
                <line x1="50" y1="180" x2="310" y2="180"></line>
                <line x1="50" y1="310" x2="310" y2="310"></line>
                <line x1="50" y1="50" x2="50" y2="310"></line>
                <line x1="180" y1="50" x2="180" y2="310"></line>
                <line x1="310" y1="50" x2="310" y2="310"></line>
                <line x1="50" y1="50" x2="310" y2="310"></line>
                <line x1="310" y1="50" x2="50" y2="310"></line>
            </svg>

            <div class="board" id="board"></div>
        </div>

        <div class="controls">
            <div class="mode-group" id="mode-selector">
                <button class="mode-btn active" data-mode="pve">人机对战</button>
                <button class="mode-btn" data-mode="pvp">双人对战</button>
            </div>
            <div class="mode-group hidden-node" id="player-id-section">
                <div style="display: flex; flex-direction: column; gap: 5px; width: 100%;">
                    <div style="display: flex; align-items: center; gap: 5px;">
                        <label style="font-size: 0.8rem; width: 50px;">玩家1:</label>
                        <input type="text" id="player1-id" placeholder="红方 ID" style="flex: 1; padding: 5px;">
                    </div>
                    <div style="display: flex; align-items: center; gap: 5px;">
                        <label style="font-size: 0.8rem; width: 50px;">玩家2:</label>
                        <input type="text" id="player2-id" placeholder="蓝方 ID" style="flex: 1; padding: 5px;">
                    </div>
                </div>
            </div>
            <button id="start-btn" class="btn btn-primary">开始游戏</button>
            <button id="reset-btn" class="btn btn-outline hidden-node">重新开始</button>
            <button id="stop-btn" class="btn btn-danger hidden-node">结束游戏</button>
        </div>
    </div>

    <script>
        const ADJACENT = {
            0: [1, 3, 4], 1: [0, 2, 4], 2: [1, 4, 5],
            3: [0, 4, 6], 4: [0, 1, 2, 3, 5, 6, 7, 8], 5: [2, 4, 8],
            6: [3, 4, 7], 7: [6, 8, 4], 8: [5, 7, 4]
        };

        let state = {
            isStarted: false,
            gameMode: 'pve',
            board: Array(9).fill(null),
            currentPlayer: 'X',
            pieces: { X: 0, O: 0 },
            selected: null,
            isOver: false,
            roundsLeft: 20,
            // 新增：存储玩家ID
            playerIds: {
                X: '',
                O: ''
            }
        };

        const els = {
            board: document.getElementById('board'),
            status: document.getElementById('status'),
            phase: document.getElementById('phase-text'),
            round: document.getElementById('round-val'),
            overlay: document.getElementById('board-overlay'),
            startBtn: document.getElementById('start-btn'),
            resetBtn: document.getElementById('reset-btn'),
            stopBtn: document.getElementById('stop-btn'),
            badge: document.querySelector('.badge'),
            modeBtns: document.querySelectorAll('.mode-btn')
        };

        const playerSection = document.getElementById('player-id-section');
        const p1Input = document.getElementById('player1-id');
        const p2Input = document.getElementById('player2-id');

        els.modeBtns.forEach(btn => {
            btn.onclick = () => {
                if(state.isStarted) return;
                els.modeBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                state.gameMode = btn.dataset.mode;

                // --- 核心逻辑：判断是否显示 ID 输入框 ---
                if (state.gameMode === 'pve') {
                    playerSection.classList.add('hidden-node');
                } else {
                    playerSection.classList.remove('hidden-node');
                }
            };
        });

        // 4. 实时监听输入并存入变量
        p1Input.addEventListener('input', (e) => {
            state.playerIds.X = e.target.value;
            console.log("当前玩家1 ID:", state.playerIds.X); // 调试用
        });

        p2Input.addEventListener('input', (e) => {
            state.playerIds.O = e.target.value;
            console.log("当前玩家2 ID:", state.playerIds.O); // 调试用
        });

        function createBoard() {
            els.board.innerHTML = '';
            for (let i = 0; i < 9; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.onclick = () => handleCellClick(i);
                els.board.appendChild(cell);
            }
        }


        function startGame() {
            state.isStarted = true;
            els.overlay.classList.add('hidden');
            els.startBtn.classList.add('hidden-node');
            document.getElementById('mode-selector').classList.add('hidden-node');
            els.resetBtn.classList.remove('hidden-node');
            els.stopBtn.classList.remove('hidden-node');
            els.phase.classList.remove('hidden-node');
            els.badge.classList.remove('hidden-node');
            playerSection.classList.add('hidden-node');

            if (state.playerIds.X === '') {
                state.playerIds.X = '红方';
            }
            if (state.playerIds.O === '') {
                state.playerIds.O = '蓝方';
            }
            reset();
        }

        function stopGame() {
            state.isStarted = false;
            els.overlay.classList.remove('hidden');
            els.startBtn.classList.remove('hidden-node');
            document.getElementById('mode-selector').classList.remove('hidden-node');
            els.startBtn.classList.remove('hidden-node');
            els.resetBtn.classList.add('hidden-node');
            els.stopBtn.classList.add('hidden-node');
            els.phase.classList.add('hidden-node');
            els.badge.classList.add('hidden-node');
            els.status.innerText = "三子棋";
            els.status.style.color = "#2f3542";
            playerSection.classList.remove('hidden-node');
            reset();
        }

        // --- 对局核心逻辑 ---

        function handleCellClick(idx) {
            if (!state.isStarted || state.isOver) return;
            
            // 人机模式下，非玩家回合禁止点击
            if (state.gameMode === 'pve' && state.currentPlayer === 'O') return;

            const p = state.currentPlayer;

            if (state.pieces[p] < 3) {
                if (!state.board[idx]) executePlace(idx, p);
            } else {
                if (state.selected === null) {
                    if (state.board[idx] === p) state.selected = idx;
                } else {
                    if (state.board[idx] === null && ADJACENT[state.selected].includes(idx)) {
                        executeMove(state.selected, idx, p);
                    } else if (state.board[idx] === p) {
                        state.selected = idx;
                    } else {
                        state.selected = null;
                    }
                }
            }
            updateUI();
        }

        function executePlace(idx, p) {
            state.board[idx] = p;
            state.pieces[p]++;
            afterAction();
        }

        function executeMove(from, to, p) {
            state.board[from] = null;
            state.board[to] = p;
            state.selected = null;
            afterAction();
        }

        function afterAction() {
            if (checkWin(state.board, state.currentPlayer)) {
                state.isOver = true;
            } else {
                if (state.currentPlayer === 'O') state.roundsLeft--;
                if (state.roundsLeft <= 0) state.isOver = true;
                else {
                    state.currentPlayer = state.currentPlayer === 'X' ? 'O' : 'X';
                    // 仅在人机模式且轮到 O 时触发 AI
                    if (state.gameMode === 'pve' && state.currentPlayer === 'O') {
                        setTimeout(aiPlay, 700);
                    }
                }
            }
        }

        // --- AI (Minimax) ---
        function aiPlay() {
            const move = getBestMove(state.board, state.pieces);
            if (move.from === null) executePlace(move.to, 'O');
            else executeMove(move.from, move.to, 'O');
            updateUI();
        }

        function getBestMove(board, pieces) {
            let best = -Infinity, move = null;
            const moves = getAllMoves(board, 'O', pieces.O);
            for (let m of moves) {
                let nb = [...board]; if(m.from !== null) nb[m.from] = null; nb[m.to] = 'O';
                let score = minimax(nb, 0, false, pieces.X, m.from === null ? pieces.O+1 : pieces.O);
                if (score > best) { best = score; move = m; }
            }
            return move;
        }

        function minimax(board, depth, isMax, xCount, oCount) {
            if (checkWin(board, 'O')) return 10 - depth;
            if (checkWin(board, 'X')) return depth - 10;
            if (depth >= 4) return 0;
            const moves = getAllMoves(board, isMax?'O':'X', isMax?oCount:xCount);
            if (isMax) {
                let b = -Infinity;
                for(let m of moves) {
                    let nb = [...board]; if(m.from !== null) nb[m.from] = null; nb[m.to] = 'O';
                    b = Math.max(b, minimax(nb, depth+1, false, xCount, m.from===null?oCount+1:oCount));
                }
                return b === -Infinity ? 0 : b;
            } else {
                let b = Infinity;
                for(let m of moves) {
                    let nb = [...board]; if(m.from !== null) nb[m.from] = null; nb[m.to] = 'X';
                    b = Math.min(b, minimax(nb, depth+1, true, m.from===null?xCount+1:xCount, oCount));
                }
                return b === Infinity ? 0 : b;
            }
        }

        function getAllMoves(board, p, count) {
            let m = [];
            if (count < 3) board.forEach((v, i) => { if(!v) m.push({from: null, to: i}) });
            else board.forEach((v, i) => { if(v===p) ADJACENT[i].forEach(n => { if(!board[n]) m.push({from: i, to: n}) })});
            return m;
        }

        function checkWin(b, p) {
            const lines = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
            return lines.some(l => l.every(i => b[i]===p));
        }

        function updateUI() {
            const cells = document.querySelectorAll('.cell');
            cells.forEach((c, i) => {
                const val = state.board[i];
                c.innerHTML = val ? `<div class="piece ${val}">
                    
                </div>` : '';
                c.classList.toggle('selected', state.selected === i);
                const canMove = state.selected !== null && !state.board[i] && ADJACENT[state.selected].includes(i);
                c.classList.toggle('can-move-to', canMove);

                const isWin = checkWin(state.board, val) && val !== null;
                if (state.isOver && isWin) {
                    if (getWinningLine(state.board, val).includes(i)) c.classList.add('winner-cell');
                } else {
                    c.classList.remove('winner-cell');
                }
            });

            els.round.innerText = state.roundsLeft;
            if (state.isStarted) {
                if (state.isOver) {
                    if (state.gameMode === 'pve') {
                        els.status.innerText = state.roundsLeft <= 0 ? "平局" : (state.currentPlayer === 'X' ? "你过关！溥小牛甘拜下风" : "溥小牛获胜！\n怎么样，不简单吧？还得多练！");
                    } else {
                        els.status.innerText = state.roundsLeft <= 0 ? "平局" : (state.currentPlayer === 'X' ?
                            (state.playerIds.X ? `${state.playerIds.X} 获胜！` : "红方获胜！"):
                            (state.playerIds.O ? `${state.playerIds.O} 获胜！` : "蓝方获胜！")
                        );
                    }
                } else {
                    const isX = state.currentPlayer === 'X';
                    if (state.gameMode === 'pve') {
                        els.status.innerText = isX ? "你的回合" : "AI 思考中...";
                    } else {
                        els.status.innerText = isX ? "红方回合" : "蓝方回合";
                    }
                    els.status.style.color = isX ? "var(--red)" : "var(--blue)";
                    els.phase.innerText = state.pieces[state.currentPlayer] < 3 ? "阶段：放置" : "阶段：移动";
                }
            }
        }

        function getWinningLine(b, p) {
            const lines = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
            return lines.find(l => l.every(i => b[i] === p)) || [];
        }

        function reset() {
            state.board = Array(9).fill(null);
            state.currentPlayer = 'X';
            state.pieces = {X:0, O:0};
            state.selected = null;
            state.isOver = false;
            state.roundsLeft = 20;
            state.playerIds = {X:'', O:''};

            p1Input.value = '';
            p2Input.value = '';
            updateUI();
        }

        els.startBtn.onclick = startGame;
        els.resetBtn.onclick = reset;
        els.stopBtn.onclick = stopGame;
        createBoard();
    </script>
</body>
</html>
